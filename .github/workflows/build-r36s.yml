name: Build R36S Libraries (Debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build SDL3 + FNA3D + FAudio (DEBUG MODE)
        run: |
          mkdir -p output
          mkdir -p logs

          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            ubuntu:20.04 \
            bash -c '
              set -x
              
              export DEBIAN_FRONTEND=noninteractive

              apt-get update -qq

              echo "=== System Info ==="
              ldd --version | head -1
              uname -m
              uname -r

              echo "=== Removing X11/Wayland libs ==="
              apt-get remove -y \
                libx11-dev \
                libx11-6 \
                libwayland-dev \
                libwayland-client0 \
                libxext-dev \
                libxrandr-dev \
                xwayland \
                2>/dev/null || true

              echo "=== Installing Dependencies ==="
              apt-get install -y \
                git \
                build-essential \
                cmake \
                ninja-build \
                pkg-config \
                ca-certificates \
                libdrm-dev \
                libgbm-dev \
                libegl1-mesa-dev \
                libgles2-mesa-dev \
                libasound2-dev \
                libudev-dev

              mkdir -p /workspace/output
              mkdir -p /workspace/logs

              echo ""
              echo "===== BUILD SDL3 WITH KMSDRM (HEADLESS) ====="
              echo ""

              cd /tmp
              
              echo "--- Cloning SDL3 ---"
              git clone \
                --depth 1 \
                --branch release-3.4.10 \
                https://github.com/libsdl-org/SDL.git
              
              cd SDL
              mkdir build
              cd build

              echo ""
              echo "--- Running CMake ---"
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                -DSDL_SHARED=ON \
                -DSDL_STATIC=OFF \
                -DSDL_KMSDRM=ON \
                -DSDL_OPENGL=ON \
                -DSDL_OPENGLES=ON \
                -DSDL_VULKAN=OFF \
                -DSDL_OFFSCREEN=ON \
                -DSDL_HIDAPI=OFF \
                -DSDL_TESTS=OFF \
                -DSDL_X11=OFF \
                -DSDL_WAYLAND=OFF \
                -DSDL_VIDEO_DRIVER_X11=OFF \
                -DSDL_VIDEO_DRIVER_WAYLAND=OFF \
                -DSDL_VIDEO_DRIVER_KMSDRM=ON \
                -DSDL_VIDEO_DRIVER_OFFSCREEN=ON \
                -DSDL_WINDOWS=OFF \
                -DCMAKE_INSTALL_PREFIX=/opt/sdl3
              
              if [ $? -ne 0 ]; then
                echo "CMake FAILED!"
                cat CMakeError.log >> /workspace/logs/cmake-error.log 2>/dev/null || true
                exit 1
              fi

              echo ""
              echo "✓ CMake OK"
              echo ""
              echo "--- Running Ninja Build ---"
              ninja -v 2>&1 | tee /workspace/logs/sdl3-build.log
              
              if [ $? -ne 0 ]; then
                echo "Ninja BUILD FAILED!"
                exit 1
              fi

              echo ""
              echo "✓ Build OK"
              echo ""
              echo "--- Running Ninja Install ---"
              ninja install 2>&1 | tee /workspace/logs/sdl3-install.log
              
              if [ $? -ne 0 ]; then
                echo "Ninja INSTALL FAILED!"
                exit 1
              fi

              echo ""
              echo "✓ Install OK"
              echo ""
              echo "--- SDL3 Output ---"
              find /opt/sdl3 -type f -name "*.so*"
              
              find /opt/sdl3 -name "libSDL3.so*" -o -name "libSDL3-3.0.so*" \
                | while read f; do
                  cp "$f" /workspace/output/
                  ls -lh "$f"
                done

              echo ""
              echo "===== BUILD COMPLETE ====="
              echo "Output files:"
              ls -lah /workspace/output

              echo ""
              echo "GLIBC required:"
              for lib in /workspace/output/*.so*; do
                echo "  $(basename $lib):"
                strings "$lib" 2>/dev/null | grep "GLIBC_" | sort -V | tail -1
              done
            ' 2>&1 | tee /workspace/logs/build-output.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: logs

      - name: Upload Libraries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r36s-libraries
          path: output
