name: Build R36S Libraries - SDL3 KMSDRM + FNA3D + FAudio

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Libraries for R36S (ARM64, GLIBC 2.31-compatible)
        run: |
          mkdir -p output logs

          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            ubuntu:20.04 \
            bash -c '
              set -e
              export DEBIAN_FRONTEND=noninteractive

              # System check
              echo "=== SYSTEM INFO ==="
              uname -m
              ldd --version | head -1
              echo "GLIBC max: $(strings /lib/aarch64-linux-gnu/libc.so.6 | grep GLIBC_ | sort -V | tail -1)"

              # Install deps
              apt-get update && apt-get install -y \
                git build-essential cmake ninja-build pkg-config \
                libdrm-dev libgbm-dev libegl1-mesa-dev libgles2-mesa-dev \
                libasound2-dev libudev-dev libx11-dev libwayland-dev

              mkdir -p /workspace/output /workspace/logs
              cd /tmp

              # ===== SDL3 =====
              echo ""
              echo "========== SDL3 =========="
              git clone --depth 1 --branch release-3.4.10 https://github.com/libsdl-org/SDL.git
              cd SDL

              # Remove the validation that blocks us
              sed -i "415d" cmake/macros.cmake

              mkdir build && cd build
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                -DSDL_SHARED=ON -DSDL_STATIC=OFF \
                -DSDL_KMSDRM=ON -DSDL_X11=ON -DSDL_WAYLAND=ON \
                -DSDL_OPENGL=ON -DSDL_OPENGLES=ON \
                -DSDL_ALSA=ON -DSDL_OFFSCREEN=ON \
                -DSDL_TESTS=OFF \
                -DCMAKE_INSTALL_PREFIX=/opt/sdl3 \
                2>&1 | tail -20

              ninja -j$(nproc) 2>&1 | tail -20
              ninja install 2>&1 | tail -10

              find /opt/sdl3 -name "libSDL3*.so*" -type f -exec cp {} /workspace/output/ \;
              echo "SDL3 done: $(ls /workspace/output/libSDL3* 2>/dev/null | wc -l) files"

              # ===== FNA3D =====
              echo ""
              echo "========== FNA3D =========="
              cd /tmp
              export PKG_CONFIG_PATH=/opt/sdl3/lib/pkgconfig
              export CMAKE_PREFIX_PATH=/opt/sdl3
              export LD_LIBRARY_PATH=/opt/sdl3/lib:$LD_LIBRARY_PATH

              git clone --recursive --depth 1 https://github.com/FNA-XNA/FNA3D.git
              cd FNA3D/build 2>/dev/null || mkdir build && cd build
              
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=/opt/sdl3 \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                2>&1 | tail -20

              ninja -j$(nproc) 2>&1 | tail -20
              find . -name "libFNA3D.so*" -type f -exec cp {} /workspace/output/libFNA3D.so.0 \;
              echo "FNA3D done: $(ls /workspace/output/libFNA3D* 2>/dev/null | wc -l) files"

              # ===== FAudio =====
              echo ""
              echo "========== FAudio =========="
              cd /tmp
              git clone --depth 1 https://github.com/FNA-XNA/FAudio.git
              cd FAudio/build 2>/dev/null || mkdir build && cd build

              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=/opt/sdl3 \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                2>&1 | tail -20

              ninja -j$(nproc) 2>&1 | tail -20
              find . -name "libFAudio.so*" -type f -exec cp {} /workspace/output/libFAudio.so.0 \;
              echo "FAudio done: $(ls /workspace/output/libFAudio* 2>/dev/null | wc -l) files"

              # ===== FINAL =====
              echo ""
              echo "========== RESULTADO =========="
              ls -lah /workspace/output/
              echo ""
              echo "=== GLIBC Requirements ==="
              for lib in /workspace/output/lib*.so*; do
                [ -f "$lib" ] && echo "$(basename $lib): $(strings "$lib" 2>/dev/null | grep GLIBC_ | sort -V | tail -1)"
              done
            ' 2>&1 | tee /workspace/logs/build.log

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r36s-libraries
          path: output

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: logs
