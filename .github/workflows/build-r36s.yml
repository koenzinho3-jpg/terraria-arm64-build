name: Build R36S Libraries

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup QEMU
    uses: docker/setup-qemu-action@v3
    with:
      platforms: arm64

  - name: Build SDL3 + FNA3D + FAudio
    run: |
      mkdir -p output
      mkdir -p logs

      docker run --rm \
        --platform linux/arm64 \
        -v "${{ github.workspace }}:/workspace" \
        ubuntu:20.04 \
        bash -c '
          set -e

          export DEBIAN_FRONTEND=noninteractive

          apt-get update

          apt-get install -y \
            git \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            ca-certificates \
            libdrm-dev \
            libgbm-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libasound2-dev \
            libudev-dev

          mkdir -p /workspace/output
          mkdir -p /workspace/logs

          echo "===== BUILD SDL3 ====="

          cd /tmp

          git clone \
            --depth 1 \
            --branch release-3.4.10 \
            https://github.com/libsdl-org/SDL.git

          mkdir SDL/build
          cd SDL/build

          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=ON \
            -DSDL_STATIC=OFF \
            -DSDL_X11=OFF \
            -DSDL_WAYLAND=OFF \
            -DSDL_KMSDRM=ON \
            -DSDL_OFFSCREEN=ON \
            -DSDL_OPENGLES=ON \
            -DSDL_OPENGL=OFF \
            -DSDL_HIDAPI=OFF \
            -DCMAKE_INSTALL_PREFIX=/opt/sdl3 \
            > /workspace/logs/sdl3-cmake.log 2>&1

          ninja > /workspace/logs/sdl3-build.log 2>&1
          ninja install >> /workspace/logs/sdl3-build.log 2>&1

          find /opt/sdl3 > /workspace/logs/sdl3-install.log

          find /opt/sdl3 -name "libSDL3.so*" \
            -exec cp {} /workspace/output/ \;

          echo "===== BUILD FNA3D ====="

          export PKG_CONFIG_PATH=/opt/sdl3/lib/pkgconfig
          export CMAKE_PREFIX_PATH=/opt/sdl3

          cd /tmp

          git clone --recursive \
            https://github.com/FNA-XNA/FNA3D.git

          mkdir FNA3D/build
          cd FNA3D/build

          cmake .. \
            -DCMAKE_PREFIX_PATH=/opt/sdl3 \
            > /workspace/logs/fna3d-cmake.log 2>&1

          make -j$(nproc) \
            > /workspace/logs/fna3d-build.log 2>&1

          find . -name "libFNA3D.so*" \
            -exec cp {} /workspace/output/libFNA3D.so.0 \;

          echo "===== BUILD FAudio ====="

          cd /tmp

          git clone \
            https://github.com/FNA-XNA/FAudio.git

          mkdir FAudio/build
          cd FAudio/build

          cmake .. \
            -DCMAKE_PREFIX_PATH=/opt/sdl3 \
            > /workspace/logs/faudio-cmake.log 2>&1

          make -j$(nproc) \
            > /workspace/logs/faudio-build.log 2>&1

          find . -name "libFAudio.so*" \
            -exec cp {} /workspace/output/libFAudio.so.0 \;

          echo "===== FINAL OUTPUT ====="
          ls -lah /workspace/output
        '

  - name: Upload Libraries
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: r36s-libraries
      path: output

  - name: Upload Logs
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: build-logs
      path: logs
