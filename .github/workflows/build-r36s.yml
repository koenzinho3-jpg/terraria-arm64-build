name: Build SDL3 + FNA3D + FAudio (aarch64, glibc 2.28)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU (arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Criar diretório de saída
        run: mkdir -p output

      - name: Build dentro do Debian Buster (arm64) via QEMU
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${{ github.workspace }}/output:/output" \
            debian:buster bash -c '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive

              echo "=== Configurando repositórios arquivados do Buster ==="
              echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
              echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
              echo "Acquire::Check-Valid-Until \"false\";" > /etc/apt/apt.conf.d/99no-check-valid-until

              apt-get update
              apt-get install -y \
                git build-essential ninja-build pkg-config wget ca-certificates \
                libdrm-dev libgbm-dev \
                libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
                libasound2-dev libudev-dev

              echo "=== Instalando CMake 3.28 (arm64) ==="
              cd /tmp
              wget -q https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-aarch64.sh
              chmod +x cmake-3.28.3-linux-aarch64.sh
              ./cmake-3.28.3-linux-aarch64.sh --skip-license --prefix=/usr/local

              echo "=== SDL3 (KMSDRM + OpenGL + OpenGL ES) ==="
              cd /tmp
              git clone --depth 1 https://github.com/libsdl-org/SDL.git
              cd SDL
              # Evita o erro fatal de falta de X11/Wayland (não precisamos deles)
              sed -i "s/message(FATAL_ERROR \"SDL could not find X11/message(WARNING \"SDL could not find X11/g" cmake/macros.cmake || true
              mkdir build && cd build
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                -DSDL_SHARED=ON -DSDL_STATIC=OFF \
                -DSDL_KMSDRM=ON -DSDL_X11=OFF -DSDL_WAYLAND=OFF \
                -DSDL_OPENGL=ON -DSDL_OPENGLES=ON \
                -DSDL_ALSA=ON -DSDL_OFFSCREEN=ON \
                -DSDL_UNIX_CONSOLE_BUILD=ON \
                -DSDL_TESTS=OFF -DSDL_IBUS=OFF \
                -DCMAKE_INSTALL_PREFIX=/opt/sdl3
              ninja -j$(nproc)
              ninja install

              echo "=== FNA3D (Vulkan OFF, OpenGL/GLES via SDL3) ==="
              cd /tmp
              export PKG_CONFIG_PATH=/opt/sdl3/lib/pkgconfig
              export CMAKE_PREFIX_PATH=/opt/sdl3
              export LD_LIBRARY_PATH=/opt/sdl3/lib:${LD_LIBRARY_PATH:-}

              git clone --recursive --depth 1 https://github.com/FNA-XNA/FNA3D.git
              cd FNA3D
              mkdir build && cd build
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                -DFNA3D_VULKAN=OFF \
                -DCMAKE_PREFIX_PATH="/opt/sdl3;/usr/local" \
                2>&1 | tee /output/fna3d-configure.log
              ninja -j$(nproc)

              echo "=== FAudio ==="
              cd /tmp
              git clone --depth 1 https://github.com/FNA-XNA/FAudio.git
              cd FAudio
              mkdir build && cd build
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3"
              ninja -j$(nproc)

              echo "=== Copiando bibliotecas para /output ==="
              cp -v /opt/sdl3/lib/libSDL3.so*           /output/
              cp -v /tmp/FNA3D/build/libFNA3D.so*       /output/
              cp -v /tmp/FAudio/build/libFAudio.so*     /output/

              echo "=== Verificação de GLIBC mínima exigida ==="
              for f in /output/*.so*; do
                echo "--- $f ---"
                objdump -p "$f" 2>/dev/null | grep GLIBC | sort -Vu || true
              done
            '

      - name: Listar artefatos gerados
        run: ls -lh output/

      - name: Upload do artefato
        uses: actions/upload-artifact@v4
        with:
          name: fna-libs-aarch64-glibc2.28
          path: output/
          if-no-files-found: error
          retention-days: 30
