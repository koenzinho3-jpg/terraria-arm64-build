name: Build R36S Libraries - SDL3 KMSDRM + FNA3D + FAudio

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build Libraries for R36S (ARM64, GLIBC 2.28-compatible)
        run: |
          mkdir -p output logs

          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            debian:buster \
            bash -c '
              set -e
              export DEBIAN_FRONTEND=noninteractive

              echo "=== SYSTEM INFO ==="
              uname -m
              
              # Correção para os repositórios arquivados do Debian Buster
              echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
              echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
              echo "Acquire::Check-Valid-Until \"false\";" > /etc/apt/apt.conf.d/99no-check-valid-until
              
              # Instala dependências básicas (sem X11/Wayland para forçar KMSDRM puro)
              apt-get update && apt-get install -y \
                git build-essential ninja-build pkg-config wget \
                libdrm-dev libgbm-dev libegl1-mesa-dev libgles2-mesa-dev \
                libasound2-dev libudev-dev

              # Instala CMake moderno (SDL3 exige 3.16+, Debian 10 nativo tem 3.13)
              cd /tmp
              wget https://github.com/Kitware/CMake/releases/download/v3.28.3/cmake-3.28.3-linux-aarch64.sh
              chmod +x cmake-3.28.3-linux-aarch64.sh
              ./cmake-3.28.3-linux-aarch64.sh --skip-license --prefix=/usr/local
              
              mkdir -p /workspace/output /workspace/logs

              # ===== SDL3 =====
              echo "========== SDL3 =========="
              git clone --depth 1 https://github.com/libsdl-org/SDL.git
              cd SDL
              mkdir build && cd build
              
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                -DSDL_SHARED=ON -DSDL_STATIC=OFF \
                -DSDL_KMSDRM=ON -DSDL_X11=OFF -DSDL_WAYLAND=OFF \
                -DSDL_OPENGL=ON -DSDL_OPENGLES=ON \
                -DSDL_ALSA=ON -DSDL_OFFSCREEN=ON \
                -DSDL_TESTS=OFF \
                -DCMAKE_INSTALL_PREFIX=/opt/sdl3
              
              ninja -j$(nproc)
              ninja install
              cp /opt/sdl3/lib/libSDL3.so* /workspace/output/

              # ===== FNA3D =====
              echo "========== FNA3D =========="
              cd /tmp
              export PKG_CONFIG_PATH=/opt/sdl3/lib/pkgconfig
              export CMAKE_PREFIX_PATH=/opt/sdl3
              export LD_LIBRARY_PATH=/opt/sdl3/lib:$LD_LIBRARY_PATH

              git clone --recursive --depth 1 https://github.com/FNA-XNA/FNA3D.git
              cd FNA3D
              mkdir build && cd build
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                -DFNA3D_VULKAN=OFF
              
              ninja -j$(nproc)
              cp libFNA3D.so* /workspace/output/libFNA3D.so.0

              # ===== FAudio =====
              echo "========== FAudio =========="
              cd /tmp
              git clone --depth 1 https://github.com/FNA-XNA/FAudio.git
              cd FAudio
              mkdir build && cd build
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3"
              
              ninja -j$(nproc)
              cp libFAudio.so* /workspace/output/libFAudio.so.0

              echo "=== FINAL GLIBC CHECK ==="
              for lib in /workspace/output/lib*.so*; do
                [ -f "$lib" ] && echo "$(basename $lib): $(strings "$lib" 2>/dev/null | grep GLIBC_ | sort -V | tail -1)"
              done
            ' 2>&1 | tee logs/build.log

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r36s-libraries
          path: output

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: logs
