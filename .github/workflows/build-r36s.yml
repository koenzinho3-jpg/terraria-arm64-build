name: Build R36S Libraries (SDL3 + FNA3D + FAudio) - ARM64 GLIBC 2.31

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build SDL3 + FNA3D + FAudio (ARM64, Ubuntu 20.04, GLIBC 2.31)
        run: |
          mkdir -p output
          mkdir -p logs

          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            ubuntu:20.04 \
            bash -c '
              set -e
              
              export DEBIAN_FRONTEND=noninteractive

              apt-get update -qq

              echo "=== System Info ==="
              echo "Architecture: $(uname -m)"
              ldd --version | head -1
              strings /lib/aarch64-linux-gnu/libc.so.6 | grep "GLIBC_" | sort -V | tail -1

              echo ""
              echo "=== Installing Build Dependencies ==="
              apt-get install -y \
                git \
                build-essential \
                cmake \
                ninja-build \
                pkg-config \
                ca-certificates \
                libdrm-dev \
                libgbm-dev \
                libegl1-mesa-dev \
                libgles2-mesa-dev \
                libasound2-dev \
                libudev-dev \
                libx11-dev \
                libwayland-dev

              mkdir -p /workspace/output
              mkdir -p /workspace/logs

              echo ""
              echo "===== BUILD SDL3 WITH KMSDRM + X11 + WAYLAND ====="
              echo ""

              cd /tmp
              
              git clone \
                --depth 1 \
                --branch release-3.4.10 \
                https://github.com/libsdl-org/SDL.git 2>&1 | grep -v "detached HEAD" || true
              
              cd SDL
              mkdir build
              cd build

              echo "--- CMake Configuration ---"
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                -DCMAKE_CXX_FLAGS="-march=armv8-a -O3" \
                -DSDL_SHARED=ON \
                -DSDL_STATIC=OFF \
                -DSDL_KMSDRM=ON \
                -DSDL_X11=ON \
                -DSDL_WAYLAND=ON \
                -DSDL_OPENGL=ON \
                -DSDL_OPENGLES=ON \
                -DSDL_ALSA=ON \
                -DSDL_OFFSCREEN=ON \
                -DSDL_TESTS=OFF \
                -DCMAKE_INSTALL_PREFIX=/opt/sdl3 \
                2>&1 | tee /workspace/logs/cmake-config.log

              echo ""
              echo "✓ CMake OK"
              echo ""
              echo "--- Ninja Build ---"
              ninja -j$(nproc) 2>&1 | tail -50 | tee /workspace/logs/sdl3-build.log

              echo ""
              echo "✓ Build OK"
              echo ""
              echo "--- Ninja Install ---"
              ninja install 2>&1 | tee /workspace/logs/sdl3-install.log

              echo ""
              echo "--- Copiando SDL3 .so ---"
              find /opt/sdl3 -name "libSDL3.so*" -exec cp {} /workspace/output/ \;
              ls -lah /workspace/output/

              echo ""
              echo "===== BUILD FNA3D ====="
              echo ""

              export PKG_CONFIG_PATH=/opt/sdl3/lib/pkgconfig:/opt/sdl3/lib64/pkgconfig
              export CMAKE_PREFIX_PATH=/opt/sdl3
              export LD_LIBRARY_PATH=/opt/sdl3/lib:/opt/sdl3/lib64:$LD_LIBRARY_PATH

              cd /tmp

              git clone --recursive \
                --depth 1 \
                https://github.com/FNA-XNA/FNA3D.git 2>&1 | grep -v "detached HEAD" || true

              mkdir FNA3D/build
              cd FNA3D/build

              echo "--- FNA3D CMake ---"
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=/opt/sdl3 \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                2>&1 | tail -30 | tee /workspace/logs/fna3d-cmake.log

              echo "--- FNA3D Build ---"
              ninja -j$(nproc) 2>&1 | tail -30 | tee /workspace/logs/fna3d-build.log

              find . -name "libFNA3D.so*" -exec cp {} /workspace/output/libFNA3D.so.0 \;
              echo "FNA3D copied: $(ls -lh /workspace/output/libFNA3D.so.0 2>/dev/null || echo "NOT FOUND")"

              echo ""
              echo "===== BUILD FAudio ====="
              echo ""

              cd /tmp

              git clone \
                --depth 1 \
                https://github.com/FNA-XNA/FAudio.git 2>&1 | grep -v "detached HEAD" || true

              mkdir FAudio/build
              cd FAudio/build

              echo "--- FAudio CMake ---"
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=/opt/sdl3 \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                2>&1 | tail -30 | tee /workspace/logs/faudio-cmake.log

              echo "--- FAudio Build ---"
              ninja -j$(nproc) 2>&1 | tail -30 | tee /workspace/logs/faudio-build.log

              find . -name "libFAudio.so*" -exec cp {} /workspace/output/libFAudio.so.0 \;
              echo "FAudio copied: $(ls -lh /workspace/output/libFAudio.so.0 2>/dev/null || echo "NOT FOUND")"

              echo ""
              echo "===== FINAL OUTPUT ====="
              ls -lah /workspace/output
              echo ""
              echo "Arquivo count: $(find /workspace/output -type f | wc -l)"

              echo ""
              echo "=== GLIBC Dependencies (IMPORTANTE!) ==="
              for lib in /workspace/output/*.so*; do
                if [ -f "$lib" ]; then
                  echo ""
                  echo "▶ $(basename $lib)"
                  strings "$lib" 2>/dev/null | grep "GLIBC_" | sort -V | uniq | tail -5
                fi
              done
            ' 2>&1 | tee /workspace/logs/build-output.log

      - name: Verify Output
        run: |
          echo "=== Output Files ==="
          ls -lah output/ 2>/dev/null || echo "ERROR: No output directory!"
          echo ""
          echo "=== Log Files ==="
          ls -lah logs/

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: logs

      - name: Upload Libraries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r36s-libraries-arm64
          path: output
