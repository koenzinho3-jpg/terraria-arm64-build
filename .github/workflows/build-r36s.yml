name: Build R36S Libraries (SDL3 + FNA3D + FAudio)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build SDL3 + FNA3D + FAudio
        run: |
          mkdir -p output
          mkdir -p logs

          docker run --rm \
            --platform linux/arm64 \
            -v "${{ github.workspace }}:/workspace" \
            ubuntu:20.04 \
            bash -c '
              set -e
              
              export DEBIAN_FRONTEND=noninteractive

              apt-get update -qq

              echo "=== Installing Dependencies ==="
              apt-get install -y \
                git \
                build-essential \
                cmake \
                ninja-build \
                pkg-config \
                ca-certificates \
                libdrm-dev \
                libgbm-dev \
                libegl1-mesa-dev \
                libgles2-mesa-dev \
                libasound2-dev \
                libudev-dev

              mkdir -p /workspace/output
              mkdir -p /workspace/logs

              echo ""
              echo "===== BUILD SDL3 WITH KMSDRM ====="
              echo ""

              cd /tmp
              
              git clone \
                --depth 1 \
                --branch release-3.4.10 \
                https://github.com/libsdl-org/SDL.git
              
              cd SDL

              # PATCH: Desabilitar validação de X11/Wayland
              echo "--- Patching CMakeLists.txt ---"
              sed -i "s/SDL could not find X11 or Wayland/# SDL could not find X11 or Wayland/" CMakeLists.txt
              sed -i "415d" cmake/macros.cmake || true
              
              mkdir build
              cd build

              echo "--- CMake Configuration ---"
              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                -DSDL_SHARED=ON \
                -DSDL_STATIC=OFF \
                -DSDL_KMSDRM=ON \
                -DSDL_OPENGL=ON \
                -DSDL_OPENGLES=ON \
                -DSDL_ALSA=ON \
                -DSDL_OFFSCREEN=ON \
                -DSDL_TESTS=OFF \
                -DCMAKE_INSTALL_PREFIX=/opt/sdl3 \
                > /workspace/logs/cmake-config.log 2>&1

              if [ ! -f build.ninja ]; then
                echo "ERRO: build.ninja não foi gerado!"
                cat /workspace/logs/cmake-config.log
                exit 1
              fi

              echo "✓ build.ninja gerado"
              echo ""
              echo "--- Ninja Build ---"
              ninja 2>&1 | tee /workspace/logs/sdl3-build.log

              echo ""
              echo "--- Ninja Install ---"
              ninja install 2>&1 | tee /workspace/logs/sdl3-install.log

              echo ""
              echo "--- Copiando SDL3 .so ---"
              find /opt/sdl3 -name "libSDL3.so*" -exec cp {} /workspace/output/ \;
              ls -lah /workspace/output/

              echo ""
              echo "===== BUILD FNA3D ====="
              echo ""

              export PKG_CONFIG_PATH=/opt/sdl3/lib/pkgconfig
              export CMAKE_PREFIX_PATH=/opt/sdl3
              export LD_LIBRARY_PATH=/opt/sdl3/lib:$LD_LIBRARY_PATH

              cd /tmp

              git clone --recursive \
                --depth 1 \
                https://github.com/FNA-XNA/FNA3D.git

              mkdir FNA3D/build
              cd FNA3D/build

              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=/opt/sdl3 \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                2>&1 | tee /workspace/logs/fna3d-cmake.log

              ninja 2>&1 | tee /workspace/logs/fna3d-build.log

              find . -name "libFNA3D.so*" -exec cp {} /workspace/output/libFNA3D.so.0 \;

              echo ""
              echo "===== BUILD FAudio ====="
              echo ""

              cd /tmp

              git clone \
                --depth 1 \
                https://github.com/FNA-XNA/FAudio.git

              mkdir FAudio/build
              cd FAudio/build

              cmake .. \
                -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH=/opt/sdl3 \
                -DCMAKE_C_FLAGS="-march=armv8-a -O3" \
                2>&1 | tee /workspace/logs/faudio-cmake.log

              ninja 2>&1 | tee /workspace/logs/faudio-build.log

              find . -name "libFAudio.so*" -exec cp {} /workspace/output/libFAudio.so.0 \;

              echo ""
              echo "===== FINAL OUTPUT ====="
              ls -lah /workspace/output

              echo ""
              echo "=== GLIBC Dependencies ==="
              for lib in /workspace/output/*.so*; do
                if [ -f "$lib" ]; then
                  echo "$(basename $lib):"
                  strings "$lib" 2>/dev/null | grep "GLIBC_" | sort -V | uniq | tail -3
                fi
              done
            ' 2>&1 | tee /workspace/logs/build-output.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: logs

      - name: Upload Libraries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r36s-libraries
          path: output
